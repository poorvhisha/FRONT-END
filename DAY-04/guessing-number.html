<!DOCTYPE html>
<html>
<head>
    <title>Guess The Number 🎯</title>
    <link rel="stylesheet" href="guessing-number.css">
</head>

<body>

<div class="container">
    <h1>🎯 Guess The Number</h1>
    <p>Guess a number between <b>1 to 100</b></p>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <button onclick="checkGuess()">Guess</button>

    <p id="message"></p>
    <p id="attempts"></p>

    <button onclick="resetGame()" class="reset">🔄 Restart</button>
</div>

<script src="guessing-number.js"></script>
</body>
</html>
