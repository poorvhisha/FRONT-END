<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4CAF50" />
    <!-- SEO Meta -->
    <meta
      name="description"
      content="Healthy Store - Buy fresh fruits, vegetables, organic products, and healthy snacks online."
    />
    <meta
      name="keywords"
      content="fruits, vegetables, organic food, healthy snacks, online grocery"
    />
    <meta name="author" content="Healthy Store Team" />
    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Healthy Store" />
    <meta
      property="og:description"
      content="Fresh fruits, vegetables, and healthy products delivered to your home."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="%PUBLIC_URL%/preview.png" />
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Fonts (Professional UI font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Title -->
    <title>Healthy Store | Fresh Fruits & Vegetables Online</title>
    <!-- Inline Global Styles (Minimal Reset + Loader UI) -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        background-color: #f9fafb;
        color: #333;
      }
      #root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Initial Loading Screen */
      .app-loader {
        text-align: center;
      }
      .app-loader h1 {
        font-size: 24px;
        color: #4CAF50;
        margin-bottom: 10px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid #4CAF50;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run this application.
    </noscript>
    <!-- Root Div -->
    <div id="root">
      <!-- Loading UI before React loads -->
      <div class="app-loader">
        <h1>Healthy Store 🥦</h1>
        <div class="spinner"></div>
        <p>Loading fresh products for you...</p>
      </div>
    </div>
    <!-- React Scripts will be injected here automatically -->
  </body>
</html>
