<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLearn</title>

<style>
    * {             
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }
    body {
        background-color: #f5f7fa;
        color: #333;
    }
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background-color: #1f2937;
        color: #fff;
    }
    .nav-links {
        display: flex;
        gap: 25px;
    }
    .nav-links a {
        color: #e5e7eb;
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 0.3s;
    }
    .nav-links a:hover {
        color: #ffffff;
    }
    .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 80vh;
        text-align: center;
        background-color: #ffffff;
    }
    .hero h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        color: #111827;
    }
    .hero p {
        margin-bottom: 20px;
        font-size: 1.1rem;
        color: #6b7280;
    }
    .hero button {
        padding: 10px 22px;
        border: none;
        background-color: #2563eb;
        color: white;
        font-size: 0.95rem;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .hero button:hover {
        background-color: #1d4ed8;
    }
    .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        padding: 50px 60px;
    }
    .card {
        background-color: #ffffff;
        padding: 30px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        text-align: center;
        font-size: 1.1rem;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }
    footer {
        text-align: center;
        padding: 15px;
        background-color: #1f2937;
        color: #e5e7eb;
    }
    @media (max-width: 768px) {
        .nav-links {
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        .features {
            grid-template-columns: 1fr;
            padding: 30px;
        }
    }
</style>
</head>
<body>
<div class="navbar">
    <div class="logo">TechLearn</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </div>
</div>
<section class="hero">
    <h1>Learn Web Development</h1>
    <p>Master HTML, CSS and JavaScript.</p>
    <button>Get Started</button>
</section>
<section class="features">
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
</section>
<footer>
    <p>© 2026 TechLearn</p>
</footer>
</body>
</html>
