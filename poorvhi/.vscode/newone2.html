<DOCTYPE html>
    <html>
        <head>
            <title>JavaScript DOM - To-Do App</title>
            <style>
                body{
                    front-family:arial;
                    width:350px;
                    margin:30px auto;
                }
                input{
                    width:220px;
                    padding:8px;
                }
                button{
                    padding:8px 12px;
                }
                li{
                    margin:10px 0;
                }
                </style>
                </head>
                <h2 id="heading">My To-Do Application</h2>
                <input type="text" id="task" placeholder="Enter Task">
                <button id="addBtn">Add Task</button>
                <ul id="taskList"></ul>
                <script>
                    //DOM
                    const heading=document.getElementById("heading");
                    const taskInput=document.get.ElementById("task");
                    const addButton=document.getElementById("addBtn");
                    const taskList=document.getElementById("taskList");
                    //Event Listener
                    addButton.addEventListener("click",addTask);
                    // Change heading when mouse is over it(event)
                    heading.addEventListener("mouseover",function(){
                        heading.innerHTML="JavaScript DOM Manipulation";
                    });
                    //Load tasks from local Storage
                    window.onload=function(){
                        let tasks=JSON.parase(localStorage.getItem("tasks")) ||[];
                        tasks.forEach(function(task){
                            createTask(task);
                        });
                    };

                    function addTask(){

                        if(taskInput.value.trim()==""){
                            aleet("Pleaseenter a task.");
                            return;
                        }
                        crerateTask(taskInput.value);
                        let tasks=JSON.parse(localStorage.getItem("tasks")) || [];
                        localStorage.setItem("tasks",JSON.stringify(tasks));
                        taskInput.value="";  
                    }
                    function createTask(task){
                        let li=document.createElement("li");
                        li.innerHTML=task +" ";
                        let removeBtn = document.createElement("button");
                        removeBtn.innerHTML="Delete";
                        removeBtn.addEventListener("click",function(){
                            li.remove();
                            let tasks = JSON.parse(localStorage.getItem("tasks"))  ||[];
                            tasks=tasks.filter(function(item){
                                return item !==task;
                            });
                            localStorage.setItem("tasks",JSON.stringify(tasks));
                        });
                        li.appendChild(removeBtn);
                        taskList.appendChild(li);                    
                    }
                    </script>
                    </body>
    </html>
