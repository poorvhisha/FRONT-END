<html>
<head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<input type="text" placeholder="Enter Your Name" id="uname">
<span id="span1"></span><br><br>

<input type="email" placeholder="Enter Email Id" id="uemail"><br><br>

<input type="password" placeholder="Enter Password" id="pass"><br><br>

<button onclick="validate()">Submit</button>

</body>

<script>
function validate() {

    let name = document.getElementById("uname").value;
    if (name == "") {
        document.getElementById("span1").innerHTML = "Please Enter Name";
    }

    let email = document.getElementById("uemail").value;
    if (!email.includes("@")) {
        alert("Invalid Email");
    }

    let pass = document.getElementById("pass").value;
    if (pass.length < 8) {
        alert("Password should be more than 8 Characters");
    }
}
</script>

</html>
